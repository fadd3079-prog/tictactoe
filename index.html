<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Modern Tic Tac Toe - 4x4 Edition</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style/style.css">
</head>
<body>

  <div class="background"></div>

  <main class="app">
    <header class="header">
      <h1>Tic Tac Toe</h1>
      <button id="themeToggle" class="icon-btn" aria-label="Toggle Dark Mode">
        <img src="https://cdn-icons-png.flaticon.com/512/869/869869.png" alt="theme" width="24" height="24">
      </button>
    </header>

    <section class="score-panel">
      <div class="score">
        <span>X</span>
        <p id="scoreX">0</p>
      </div>
      <div class="score">
        <span>Draw</span>
        <p id="scoreDraw">0</p>
      </div>
      <div class="score">
        <span>O</span>
        <p id="scoreO">0</p>
      </div>
    </section>

    <p id="statusText" class="status" aria-live="polite">Player X Turn</p>

    <section id="board" class="board" role="grid"></section>

    <button id="restartBtn" class="restart">Restart Game</button>

    <a href="https://saweria.co/fadholpemula" target="_blank" rel="noopener noreferrer" class="support-btn">Support Developer
    </a>
  </main>

  <div id="modal" class="modal hidden" aria-hidden="true">
    <div class="modal-content">
      <h2 id="modalText"></h2>
      <button id="playAgain">Play Again</button>
    </div>
  </div>

  <audio id="clickSound" src="https://assets.mixkit.co/active_storage/sfx/2571/2571-preview.mp3" preload="auto"></audio>
  <audio id="winSound" src="https://assets.mixkit.co/active_storage/sfx/1435/1435-preview.mp3" preload="auto"></audio>

  <script src="js/script.js"></script>
</body>
</html>
